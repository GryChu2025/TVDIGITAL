<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TV Digital en Vivo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      text-align: center;
    }

    /* HEADER */
    header {
      background: #111;
      padding: 18px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
      border-bottom: 2px solid red;
    }

    /* CONTENEDOR */
    .container {
      max-width: 1000px;
      margin: 20px auto;
      padding: 10px;
    }

    /* VIDEO */
    .live-box {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255,0,0,0.3);
    }

    .live-box iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* ETIQUETA LIVE */
    .live-tag {
      margin-top: 10px;
      display: inline-block;
      background: red;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 5px;
      font-weight: bold;
    }

    /* INFO */
    .info {
      margin-top: 15px;
      font-size: 14px;
      color: #aaa;
    }

    /* FOOTER */
    footer {
      margin-top: 30px;
      padding: 15px;
      background: #111;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

  <header>
    📺 TV DIGITAL EN VIVO
  </header>

  <div class="container">

    <div class="live-box">

      <!-- 🔴 REEMPLAZAR ESTE LINK -->
      <iframe 
        src="PEGAR_AQUI_TU_LINK_DEL_LIVE"
        allowfullscreen>
      </iframe>

    </div>

    <div class="live-tag">
      🔴 EN VIVO AHORA
    </div>

    <div class="info">
      Transmisión oficial - TV Digital Online
    </div>

  </div>

  <footer>
    © 2026 TV Digital - Todos los derechos reservados
  </footer>

</body>
</html>
